<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Code Reviewer</title>
    <link rel="stylesheet" href="App.css">
    <style>
        .language-selector {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .language-selector label {
            color: #a1a1a1;
            font-weight: 600;
        }

        .language-selector select {
            padding: 8px 12px;
            background: #0f172a;
            color: #e2e8f0;
            border: 1px solid #334155;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .language-selector select:hover {
            border-color: #38bdf8;
        }

        .error-message {
            background: #7f1d1d;
            border: 1px solid #dc2626;
            color: #fecaca;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }

        .success-message {
            background: #1f2937;
            border: 1px solid #10b981;
            color: #a7f3d0;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #38bdf8;
        }

        .loading::after {
            content: '';
            width: 20px;
            height: 20px;
            border: 3px solid #334155;
            border-top: 3px solid #38bdf8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-online {
            background: #10b981;
        }

        .status-offline {
            background: #dc2626;
        }

        .status-text {
            font-size: 12px;
            color: #a1a1a1;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>🤖 AI Code Reviewer</h2>
            <div style="display: flex; gap: 10px; align-items: center;">
                <div class="status-text">
                    <span class="status-indicator status-offline" id="statusIndicator"></span>
                    <span id="statusText">Connecting...</span>
                </div>
                <button id="settingsBtn" style="background: none; border: none; cursor: pointer; font-size: 18px; padding: 0;" title="Settings">⚙️</button>
            </div>
        </div>

        <!-- Settings Modal -->
        <div id="settingsModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; padding: 20px;">
            <div style="background: #1e293b; padding: 20px; border-radius: 8px; max-width: 400px; margin: auto; margin-top: 50px;">
                <h3 style="color: #e2e8f0; margin-top: 0;">Settings</h3>
                <label style="display: block; color: #a1a1a1; margin-bottom: 8px;">Backend API URL:</label>
                <input id="apiUrlInput" type="text" style="width: 100%; padding: 10px; background: #0f172a; color: #e2e8f0; border: 1px solid #334155; border-radius: 6px; box-sizing: border-box; margin-bottom: 15px;" placeholder="http://localhost:5000">
                <div style="display: flex; gap: 10px;">
                    <button id="saveSettingsBtn" style="flex: 1; padding: 10px; background: #38bdf8; color: #000; border: none; border-radius: 6px; cursor: pointer; font-weight: 600;">Save</button>
                    <button id="closeSettingsBtn" style="flex: 1; padding: 10px; background: #334155; color: #e2e8f0; border: none; border-radius: 6px; cursor: pointer;">Close</button>
                </div>
            </div>
        </div>

        <div class="language-selector">
            <label for="language">Programming Language:</label>
            <select id="language">
                <option value="javascript">JavaScript</option>
                <option value="python">Python</option>
                <option value="java">Java</option>
                <option value="cpp">C++</option>
                <option value="csharp">C#</option>
                <option value="php">PHP</option>
                <option value="ruby">Ruby</option>
                <option value="go">Go</option>
                <option value="rust">Rust</option>
                <option value="typescript">TypeScript</option>
                <option value="react">React/JSX</option>
                <option value="html">HTML</option>
                <option value="css">CSS</option>
                <option value="sql">SQL</option>
                <option value="bash">Bash</option>
            </select>
        </div>

        <textarea id="code" placeholder="Paste your code here..."></textarea>

        <div class="buttons">
            <button id="reviewBtn">📋 Review Code</button>
            <button id="bugBtn">🐛 Find Bugs</button>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
        <div id="output"></div>
        <div id="apiStatus" class="status-text"></div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
